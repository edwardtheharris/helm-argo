apiVersion: v1
kind: Service
metadata:
  annotations:
    metallb.io/ip-allocated-from-pool: the-hard-way
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/part-of: argocd
  name: {{ .Release.Name }}
spec:
  allocateLoadBalancerNodePorts: true
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
    - name: https
      port: 443
      protocol: TCP
      targetPort: 8080
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
  sessionAffinity: None
  type: LoadBalancer
